<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
        />
        <meta name="theme-color" content="#05070b" />
        <title>Explore</title>
        <meta
            name="description"
            content="A personal discovery feed over the sims."
        />
        <link rel="icon" type="image/svg+xml" href="favicon.svg" />
        <link rel="stylesheet" href="tokens.css" />
        <link rel="stylesheet" href="sim-shell.css" />
        <style>
            html,
            body {
                margin: 0;
                height: 100%;
                background: var(--bg);
                overflow: hidden;
            }
            #feed-stage {
                position: fixed;
                inset: 0;
            }
            .feed-frame {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                border: 0;
                opacity: 0; /* warm/loading frames are invisible... */
                pointer-events: none; /* ...and non-interactive */
                z-index: 0;
            }
            .feed-frame.show {
                opacity: 1; /* the one visible item */
                pointer-events: auto;
                z-index: 1;
            }

            /* The sims drop their own home pill in feed mode, so the feed host
               carries one instead — a plain top-level link straight to index.
               Same globe glass lockup as the sims/content pages. */
            .feed-home {
                position: fixed;
                top: max(20px, env(safe-area-inset-top, 0px));
                left: max(20px, env(safe-area-inset-left, 0px));
                z-index: 10;
                display: flex;
                align-items: center;
                gap: 8px;
                height: 50px;
                padding: 0 16px 0 15px;
                border-radius: 999px;
                background: var(--glass-bg);
                -webkit-backdrop-filter: var(--glass-blur);
                backdrop-filter: var(--glass-blur);
                border: 1px solid var(--glass-border);
                color: var(--ink);
                text-decoration: none;
                font-family: var(--font-sans);
                font-size: 13px;
                font-weight: 600;
                letter-spacing: -0.01em;
                white-space: nowrap;
                box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
                transition:
                    background 0.15s,
                    transform 0.15s;
            }
            .feed-home:hover {
                background: var(--glass-bg-strong);
                transform: translateY(-1px);
            }
            .feed-home:active {
                transform: translateY(0) scale(0.98);
            }
            .feed-home .mark {
                color: var(--accent);
                font-size: 15px;
            }
            @media (max-width: 420px) {
                .feed-home {
                    padding: 0;
                    width: 50px;
                    justify-content: center;
                }
                .feed-home .wordmark {
                    display: none;
                }
            }

            /* Top-right "Take control": the mode switch out of the stream into
               studio. A glass pill symmetric with the top-left home pill, kept
               apart from the bottom Back/Next pager. Explore only. */
            .feed-take {
                position: fixed;
                top: max(20px, env(safe-area-inset-top, 0px));
                right: max(20px, env(safe-area-inset-right, 0px));
                z-index: 10;
                display: flex;
                align-items: center;
                gap: 8px;
                height: 50px;
                padding: 0 16px;
                border-radius: 999px;
                background: var(--glass-bg);
                -webkit-backdrop-filter: var(--glass-blur);
                backdrop-filter: var(--glass-blur);
                border: 1px solid var(--glass-border);
                color: var(--ink);
                font-family: var(--font-sans);
                font-size: 13px;
                font-weight: 600;
                letter-spacing: -0.01em;
                white-space: nowrap;
                cursor: pointer;
                box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
                transition:
                    background 0.15s,
                    transform 0.15s;
            }
            .feed-take:hover {
                background: var(--glass-bg-strong);
                transform: translateY(-1px);
            }
            .feed-take:active {
                transform: translateY(0) scale(0.98);
            }
            .feed-take .mark {
                font-size: 15px;
            }
            @media (max-width: 420px) {
                .feed-take {
                    padding: 0;
                    width: 50px;
                    justify-content: center;
                }
                .feed-take .wordmark {
                    display: none;
                }
            }

            /* Bottom stream bar: Back / Next (compass). Host-owned; explore
               only. Anchored bottom-right. Buttons reuse .fab from
               sim-shell.css. */
            .feed-bar {
                position: fixed;
                bottom: max(20px, env(safe-area-inset-bottom, 0px));
                right: max(20px, env(safe-area-inset-right, 0px));
                z-index: 10;
                display: flex;
                align-items: center;
                gap: 12px;
            }

            /* Top-left "Return to explore", studio only, hidden until taken. */
            .feed-return {
                position: fixed;
                top: max(20px, env(safe-area-inset-top, 0px));
                left: max(20px, env(safe-area-inset-left, 0px));
                z-index: 10;
                display: none;
                align-items: center;
                gap: 8px;
                height: 50px;
                padding: 0 16px;
                border-radius: 999px;
                background: var(--glass-bg);
                -webkit-backdrop-filter: var(--glass-blur);
                backdrop-filter: var(--glass-blur);
                border: 1px solid var(--glass-border);
                color: var(--ink);
                font-family: var(--font-sans);
                font-size: 13px;
                font-weight: 600;
                letter-spacing: -0.01em;
                white-space: nowrap;
                cursor: pointer;
                box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
                transition: background 0.15s;
            }
            .feed-return:hover {
                background: var(--glass-bg-strong);
            }

            /* Taken control: hide explore chrome, show the return affordance. */
            body.taken .feed-home,
            body.taken .feed-take,
            body.taken .feed-bar {
                display: none;
            }
            body.taken .feed-return {
                display: flex;
            }
        </style>
    </head>
    <body>
        <a
            class="feed-home"
            href="index.html"
            aria-label="Tiny Worlds — back to all worlds"
        >
            <svg class="mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg><span class="wordmark">Tiny Worlds</span>
        </a>

        <button
            class="feed-return"
            id="feed-return"
            aria-label="Return to explore"
        >
            <svg class="mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg><span>Explore</span>
        </button>

        <button
            class="feed-take"
            id="feed-take"
            title="Take control"
            aria-label="Take control"
        >
            <svg class="mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="4" y1="8" x2="20" y2="8"/><line x1="4" y1="16" x2="20" y2="16"/><circle cx="9" cy="8" r="2.5" fill="rgba(20,25,35,0.95)"/><circle cx="15" cy="16" r="2.5" fill="rgba(20,25,35,0.95)"/></svg><span class="wordmark">Take control</span>
        </button>

        <div class="feed-bar" id="feed-bar">
            <button class="fab" id="feed-back" title="Back" aria-label="Back">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <button class="fab fab-primary" id="feed-next" title="Next" aria-label="Next">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polygon points="15.5 8.5 10.5 10.5 8.5 15.5 13.5 13.5" fill="currentColor" stroke="none"/></svg>
            </button>
        </div>

        <div id="feed-stage"></div>
        <script src="feed.js"></script>
    </body>
</html>
