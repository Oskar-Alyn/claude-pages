<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, viewport-fit=cover"
        />
        <meta name="theme-color" content="#05070b" />
        <title>Tiny Worlds: interactive simulations that run themselves</title>
        <meta
            name="description"
            content="Tiny interactive simulations that run in your browser: slime mold, boids, particle life, flow fields, and reaction-diffusion. Press play and watch, dive into a single world, or read a visual walkthrough of how each one works."
        />
        <link rel="icon" type="image/svg+xml" href="favicon.svg" />
        <link rel="stylesheet" href="tokens.css" />

        <meta property="og:type" content="website" />
        <meta property="og:title" content="Tiny Worlds" />
        <meta
            property="og:description"
            content="Tiny interactive simulations that run themselves: slime mold, boids, particle life, flow fields, and reaction-diffusion. Watch, play, or see how they work."
        />
        <meta property="og:image" content="og/index.png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:image" content="og/index.png" />
        <meta name="twitter:title" content="Tiny Worlds" />
        <meta
            name="twitter:description"
            content="Tiny interactive simulations that run themselves. Watch, play, or see how they work."
        />

        <style>
            /* Tokens (accent, ink, muted, glass, fonts) come from tokens.css.
               Gallery cards set data-world to retint their accent per world. */
            html {
                scroll-padding-top: 52px;
                scroll-behavior: smooth;
            }
            @media (prefers-reduced-motion: reduce) {
                html {
                    scroll-behavior: auto;
                }
            }
            body {
                margin: 0;
                background: var(--bg);
                color: var(--ink);
                font-family: var(--font-sans);
                -webkit-font-smoothing: antialiased;
                line-height: 1.5;
                overflow-x: hidden;
            }

            /* ---------- Nav ---------- */
            .nav {
                position: sticky;
                top: 0;
                z-index: 50;
                height: 52px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 max(18px, env(safe-area-inset-left));
                background: var(--nav-bg);
                -webkit-backdrop-filter: var(--glass-blur);
                backdrop-filter: var(--glass-blur);
                border-bottom: 1px solid var(--line);
                font-size: 13px;
            }
            .nav .brand {
                font-weight: 600;
                letter-spacing: -0.01em;
                color: var(--ink);
                text-decoration: none;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .nav .brand .mark {
                color: var(--accent);
                font-size: 15px;
            }
            .nav .links {
                display: flex;
                gap: 17px;
                flex-wrap: wrap;
                justify-content: flex-end;
            }
            .nav .links a {
                color: rgba(255, 255, 255, 0.66);
                text-decoration: none;
                transition: color 0.15s;
                white-space: nowrap;
            }
            .nav .links a:hover {
                color: #fff;
            }
            .nav .links a.feed-link {
                color: var(--accent);
                font-weight: 600;
            }
            @media (max-width: 640px) {
                .nav .links a:not(.feed-link) {
                    display: none;
                }
            }

            /* ---------- Hero ---------- */
            .hero {
                position: relative;
                min-height: 100vh;
                min-height: 100svh;
                display: grid;
                place-items: center;
                overflow: hidden;
            }
            .bg {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                display: block;
                z-index: 0;
                pointer-events: none;
            }
            /* Hero canvases crossfade between sims (the self-playing feed). */
            .hero-bg {
                opacity: 0;
                transition: opacity 1.1s ease;
            }
            .hero-bg.show {
                opacity: 1;
            }
            @media (prefers-reduced-motion: reduce) {
                .hero-bg {
                    transition: none;
                }
            }
            .scrim {
                position: absolute;
                inset: 0;
                z-index: 1;
                pointer-events: none;
                background:
                    radial-gradient(
                        ellipse 80% 60% at center 48%,
                        rgba(0, 0, 0, 0.5),
                        rgba(0, 0, 0, 0.12) 55%,
                        rgba(0, 0, 0, 0.55)
                    ),
                    linear-gradient(
                        rgba(5, 7, 11, 0.35),
                        rgba(5, 7, 11, 0) 22%,
                        rgba(5, 7, 11, 0) 78%,
                        rgba(5, 7, 11, 0.55)
                    );
            }
            .content {
                position: relative;
                z-index: 2;
                text-align: center;
                max-width: 780px;
                padding: 96px 24px;
                opacity: 0;
                transform: translateY(30px);
                transition:
                    opacity 0.9s var(--ease-out),
                    transform 0.9s var(--ease-out);
            }
            .content.in {
                opacity: 1;
                transform: none;
            }
            @media (prefers-reduced-motion: reduce) {
                .content {
                    opacity: 1;
                    transform: none;
                    transition: none;
                }
            }

            .title {
                font-size: clamp(42px, 8vw, 96px);
                line-height: 1.02;
                letter-spacing: -0.035em;
                font-weight: 700;
                margin: 0.16em 0 0.32em;
            }
            .pitch {
                font-size: clamp(16px, 2.1vw, 21px);
                line-height: 1.5;
                color: var(--muted);
                max-width: 36ch;
                margin: 0 auto 1.7em;
            }
            .cta-row {
                display: flex;
                gap: 14px;
                justify-content: center;
                align-items: center;
                flex-wrap: wrap;
            }
            /* Accent-tinted glass — same primary-button language as the sims'
               .fab-primary, so the home and the sims read as one product. */
            .cta {
                display: inline-flex;
                align-items: center;
                gap: 7px;
                background: rgba(var(--accent-rgb), 0.16);
                -webkit-backdrop-filter: var(--glass-blur);
                backdrop-filter: var(--glass-blur);
                border: 1px solid rgba(var(--accent-rgb), 0.5);
                color: var(--accent);
                padding: 12px 24px;
                border-radius: var(--radius-pill);
                font-size: 15px;
                font-weight: 600;
                text-decoration: none;
                transition:
                    transform 0.16s ease,
                    box-shadow 0.16s ease,
                    background 0.16s ease,
                    border-color 0.16s ease,
                    color 0.16s ease;
                box-shadow: 0 8px 30px rgba(var(--accent-rgb), 0.18);
            }
            .cta:hover {
                transform: translateY(-2px);
                background: rgba(var(--accent-rgb), 0.28);
                border-color: rgba(var(--accent-rgb), 0.7);
                color: var(--ink);
                box-shadow: 0 12px 38px rgba(var(--accent-rgb), 0.3);
            }
            .cta .arrow {
                width: 1.1em;
                height: 1.1em;
                flex: none;
                transition: transform 0.16s ease;
            }
            .cta:hover .arrow {
                transform: translateX(3px);
            }
            .cta-ghost {
                color: var(--muted);
                text-decoration: none;
                font-size: 14px;
                padding: 11px 8px;
                transition: color 0.15s;
            }
            .cta-ghost:hover {
                color: #fff;
            }

            /* ---------- Hero specifics ---------- */
            .hero .title {
                font-size: clamp(52px, 11vw, 132px);
            }
            .hero .lede {
                font-size: clamp(17px, 2.4vw, 24px);
                color: var(--muted);
                max-width: 32ch;
                margin: 0 auto 1.6em;
            }
            .chev {
                position: absolute;
                bottom: 26px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 2;
                color: rgba(255, 255, 255, 0.55);
                animation: bob 2s ease-in-out infinite;
            }
            @keyframes bob {
                0%,
                100% {
                    transform: translate(-50%, 0);
                }
                50% {
                    transform: translate(-50%, 8px);
                }
            }
            @media (prefers-reduced-motion: reduce) {
                .chev {
                    animation: none;
                }
            }

            /* ---------- Worlds gallery ---------- */
            .worlds {
                max-width: 1180px;
                margin: 0 auto;
                padding: 84px max(18px, env(safe-area-inset-left)) 36px;
            }
            .gallery {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
            }
            .world {
                position: relative;
                overflow: hidden;
                border-radius: 20px;
                /* Faint accent edge per world (data-world retints --accent-rgb),
                   brightening into a soft glow ring on hover. */
                border: 1px solid rgba(var(--accent-rgb), 0.22);
                min-height: clamp(360px, 56vh, 600px);
                display: flex;
                align-items: flex-end;
                transition:
                    border-color 0.2s ease,
                    box-shadow 0.2s ease;
            }
            .world:hover {
                border-color: rgba(var(--accent-rgb), 0.5);
                box-shadow: 0 0 40px rgba(var(--accent-rgb), 0.18);
            }
            @media (hover: none) {
                .world:hover {
                    border-color: rgba(var(--accent-rgb), 0.22);
                    box-shadow: none;
                }
            }
            .world .content {
                position: relative;
                z-index: 2;
                text-align: left;
                max-width: none;
                width: 100%;
                padding: 30px;
            }
            .world .wname {
                font-size: clamp(26px, 3.4vw, 40px);
                line-height: 1.04;
                letter-spacing: -0.03em;
                font-weight: 700;
                margin: 0.14em 0 0.3em;
            }
            .world .pitch {
                margin: 0 0 1.2em;
                max-width: 32ch;
                font-size: clamp(15px, 1.7vw, 18px);
            }
            .world .cta-row {
                justify-content: flex-start;
            }
            /* About card closes the gallery with a black-and-white particle-life
               demo (the Mono palette) behind its blurb. var(--card) is just the
               fallback under the canvas. */
            .world-about {
                background: var(--card);
            }
            /* Lighter scrim than the other cards so the mono demo reads through. */
            .world-about .scrim {
                opacity: 0.5;
            }
            .world-about .pitch {
                max-width: 38ch;
            }
            @media (max-width: 720px) {
                .gallery {
                    grid-template-columns: 1fr;
                }
                .world {
                    min-height: 70vh;
                }
            }

            /* Primary CTAs run a touch heavier for punch. (Font + brighter
               --muted are now site-wide in tokens.css.) */
            .cta {
                font-weight: 700;
            }
        </style>
    </head>
    <body>
        <nav class="nav">
            <a class="brand" href="#top"
                ><svg
                    class="mark"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                >
                    <circle cx="12" cy="12" r="10" />
                    <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" />
                    <path d="M2 12h20" />
                </svg>
                Tiny Worlds</a
            >
            <div class="links">
                <a class="feed-link" href="feed.html">Explore</a>

            </div>
        </nav>

        <header class="hero" id="top">
            <canvas class="bg hero-bg show" id="hero-a"></canvas>
            <canvas class="bg hero-bg" id="hero-b"></canvas>
            <div class="scrim"></div>
            <div class="content in">
                <h1 class="title">Tiny Worlds</h1>
                <p class="lede">A few simple rules, with surprising results.</p>
                <div class="cta-row">
                    <a class="cta" href="feed.html"
                        >Explore
                        <svg
                            class="arrow"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="1.8"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            aria-hidden="true"
                        >
                            <circle cx="12" cy="12" r="10" />
                            <polygon
                                points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"
                            /></svg
                    ></a>
                    <a class="cta-ghost" href="#worlds">or see them all ↓</a>
                </div>
            </div>
            <svg
                class="chev"
                width="26"
                height="26"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <polyline points="6 9 12 15 18 9" />
            </svg>
        </header>

        <section class="worlds" id="worlds">
            <div class="gallery" id="gallery"></div>
        </section>

        <script>
            (() => {
                const REDUCED = window.matchMedia(
                    "(prefers-reduced-motion: reduce)",
                ).matches;
                const DPR = Math.min(window.devicePixelRatio || 1, 1.5);
                const TAU = Math.PI * 2;

                // ---------- shared palette + noise helpers ----------
                const PALS = {
                    Inferno: [
                        "#000000",
                        "#1a0000",
                        "#a00010",
                        "#ff4020",
                        "#ffec70",
                    ],
                    Cyber: [
                        "#000810",
                        "#0a2030",
                        "#0a8a98",
                        "#5af0d8",
                        "#fff088",
                    ],
                    Twilight: [
                        "#040208",
                        "#280a40",
                        "#8a2080",
                        "#ff60c0",
                        "#ffe098",
                    ],
                    Frost: [
                        "#000814",
                        "#0a2e58",
                        "#3a86d0",
                        "#9ed4ff",
                        "#f0faff",
                    ],
                    Acid: [
                        "#000000",
                        "#082a14",
                        "#1a8a3c",
                        "#7af066",
                        "#f5ffa8",
                    ],
                    Iris: [
                        "#000018",
                        "#0c1448",
                        "#4a3ac0",
                        "#c060e0",
                        "#ffd0e0",
                    ],
                    // Black-and-white ramp for the about card's particle-life
                    // demo: dark bg, species sampled across grey → white.
                    Mono: [
                        "#05070b",
                        "#3a3a3a",
                        "#777777",
                        "#b5b5b5",
                        "#ffffff",
                    ],
                };
                function hexToRgb(h) {
                    return [
                        parseInt(h.slice(1, 3), 16),
                        parseInt(h.slice(3, 5), 16),
                        parseInt(h.slice(5, 7), 16),
                    ];
                }
                function buildLUT(stops) {
                    const lut = new Uint8ClampedArray(256 * 3);
                    const seg = stops.length - 1;
                    for (let i = 0; i < 256; i++) {
                        const sf = (i / 255) * seg;
                        const s = Math.min(sf | 0, seg - 1);
                        const u = sf - s;
                        const c0 = hexToRgb(stops[s]);
                        const c1 = hexToRgb(stops[s + 1]);
                        lut[i * 3] = c0[0] + (c1[0] - c0[0]) * u;
                        lut[i * 3 + 1] = c0[1] + (c1[1] - c0[1]) * u;
                        lut[i * 3 + 2] = c0[2] + (c1[2] - c0[2]) * u;
                    }
                    return lut;
                }
                function colorStrings(lut) {
                    const a = new Array(256);
                    for (let i = 0; i < 256; i++)
                        a[i] =
                            "rgb(" +
                            lut[i * 3] +
                            "," +
                            lut[i * 3 + 1] +
                            "," +
                            lut[i * 3 + 2] +
                            ")";
                    return a;
                }
                function nhash(ix, iy) {
                    let h = Math.imul(ix, 374761393) ^ Math.imul(iy, 668265263);
                    h = Math.imul(h ^ (h >>> 13), 1274126177);
                    h ^= h >>> 16;
                    return (h >>> 0) / 4294967295;
                }
                function vnoise(x, y) {
                    const x0 = Math.floor(x),
                        y0 = Math.floor(y);
                    const fxr = x - x0,
                        fyr = y - y0;
                    const fx = fxr * fxr * (3 - 2 * fxr);
                    const fy = fyr * fyr * (3 - 2 * fyr);
                    const v00 = nhash(x0, y0),
                        v10 = nhash(x0 + 1, y0),
                        v01 = nhash(x0, y0 + 1),
                        v11 = nhash(x0 + 1, y0 + 1);
                    const a = v00 + (v10 - v00) * fx;
                    const b = v01 + (v11 - v01) * fx;
                    return a + (b - a) * fy;
                }

                // Size a canvas backing store to its on-screen box (full-res).
                function fitFull(canvas) {
                    const r = canvas.getBoundingClientRect();
                    const w = Math.max(2, Math.round(r.width * DPR));
                    const h = Math.max(2, Math.round(r.height * DPR));
                    if (canvas.width !== w || canvas.height !== h) {
                        canvas.width = w;
                        canvas.height = h;
                    }
                    return { w, h };
                }
                // Small grid backing, stretched by CSS — cheap for field sims.
                function fitGrid(canvas, targetW) {
                    const r = canvas.getBoundingClientRect();
                    const gw = targetW;
                    const gh = Math.max(
                        50,
                        Math.round((gw * r.height) / Math.max(1, r.width)),
                    );
                    canvas.width = gw;
                    canvas.height = gh;
                    return { gw, gh };
                }

                // ============================================================
                // PREVIEW ENGINES — each returns { start, stop, resize }
                // ============================================================

                // ---- Flow field ----
                function createFlow(canvas, stops) {
                    const ctx = canvas.getContext("2d");
                    const cstr = colorStrings(buildLUT(stops));
                    const bg = hexToRgb(stops[0]);
                    let W = 0,
                        H = 0,
                        n = 0,
                        xs,
                        ys,
                        vx,
                        vy,
                        age,
                        raf = 0,
                        t = 0;
                    const ns = 0.009 / DPR;
                    function respawn(i) {
                        xs[i] = Math.random() * W;
                        ys[i] = Math.random() * H;
                        vx[i] = 0;
                        vy[i] = 0;
                        age[i] = Math.random() * 180;
                    }
                    function init() {
                        const s = fitFull(canvas);
                        W = s.w;
                        H = s.h;
                        n = Math.min(900, Math.round((W * H) / 2200));
                        xs = new Float32Array(n);
                        ys = new Float32Array(n);
                        vx = new Float32Array(n);
                        vy = new Float32Array(n);
                        age = new Float32Array(n);
                        for (let i = 0; i < n; i++) respawn(i);
                        ctx.fillStyle =
                            "rgb(" + bg[0] + "," + bg[1] + "," + bg[2] + ")";
                        ctx.fillRect(0, 0, W, H);
                    }
                    function step() {
                        t += 1;
                        const ox = 1000 + Math.cos(t * 0.01) * 3;
                        const oy = 1000 + Math.sin(t * 0.01) * 3;
                        const sp = 1.5 * DPR;
                        const ds = 2.2 * DPR;
                        ctx.fillStyle =
                            "rgba(" +
                            bg[0] +
                            "," +
                            bg[1] +
                            "," +
                            bg[2] +
                            ",0.09)";
                        ctx.fillRect(0, 0, W, H);
                        for (let i = 0; i < n; i++) {
                            const a =
                                vnoise(xs[i] * ns + ox, ys[i] * ns + oy) *
                                TAU *
                                2;
                            vx[i] += (Math.cos(a) * sp - vx[i]) * 0.18;
                            vy[i] += (Math.sin(a) * sp - vy[i]) * 0.18;
                            let nx = xs[i] + vx[i],
                                ny = ys[i] + vy[i];
                            nx -= Math.floor(nx / W) * W;
                            ny -= Math.floor(ny / H) * H;
                            xs[i] = nx;
                            ys[i] = ny;
                            const ang = Math.atan2(vy[i], vx[i]);
                            let idx =
                                ((0.4 + 0.6 * ((ang + Math.PI) / TAU)) * 255) |
                                0;
                            if (idx > 255) idx = 255;
                            ctx.fillStyle = cstr[idx];
                            ctx.fillRect(nx - 1, ny - 1, ds, ds);
                            if (++age[i] > 220) respawn(i);
                        }
                    }
                    function frame() {
                        step();
                        raf = requestAnimationFrame(frame);
                    }
                    return {
                        start() {
                            if (!W) init();
                            if (REDUCED) {
                                for (let k = 0; k < 80; k++) step();
                                return;
                            }
                            if (!raf) frame();
                        },
                        stop() {
                            cancelAnimationFrame(raf);
                            raf = 0;
                        },
                        resize() {
                            init();
                        },
                    };
                }

                // ---- Boids ----
                function createBoids(canvas, stops) {
                    const ctx = canvas.getContext("2d");
                    const cstr = colorStrings(buildLUT(stops));
                    const bg = hexToRgb(stops[0]);
                    let W = 0,
                        H = 0,
                        n = 0,
                        xs,
                        ys,
                        vx,
                        vy,
                        raf = 0;
                    function init() {
                        const s = fitFull(canvas);
                        W = s.w;
                        H = s.h;
                        n = Math.min(170, Math.round((W * H) / 9000));
                        xs = new Float32Array(n);
                        ys = new Float32Array(n);
                        vx = new Float32Array(n);
                        vy = new Float32Array(n);
                        const sp = 2.2 * DPR;
                        for (let i = 0; i < n; i++) {
                            xs[i] = Math.random() * W;
                            ys[i] = Math.random() * H;
                            const a = Math.random() * TAU;
                            vx[i] = Math.cos(a) * sp;
                            vy[i] = Math.sin(a) * sp;
                        }
                    }
                    function step() {
                        const visSq = (46 * DPR) ** 2;
                        const sepSq = (17 * DPR) ** 2;
                        const max = 2.6 * DPR,
                            min = max * 0.5;
                        const edge = 0.6 * DPR,
                            marg = 46 * DPR;
                        for (let i = 0; i < n; i++) {
                            let avx = 0,
                                avy = 0,
                                apx = 0,
                                apy = 0,
                                sx = 0,
                                sy = 0,
                                c = 0;
                            for (let j = 0; j < n; j++) {
                                if (i === j) continue;
                                const dx = xs[j] - xs[i],
                                    dy = ys[j] - ys[i];
                                const d2 = dx * dx + dy * dy;
                                if (d2 > visSq) continue;
                                c++;
                                avx += vx[j];
                                avy += vy[j];
                                apx += xs[j];
                                apy += ys[j];
                                if (d2 < sepSq) {
                                    sx -= dx;
                                    sy -= dy;
                                }
                            }
                            let nvx = vx[i],
                                nvy = vy[i];
                            if (c > 0) {
                                avx /= c;
                                avy /= c;
                                apx /= c;
                                apy /= c;
                                nvx +=
                                    (avx - nvx) * 0.06 + (apx - xs[i]) * 0.0008;
                                nvy +=
                                    (avy - nvy) * 0.06 + (apy - ys[i]) * 0.0008;
                            }
                            nvx += sx * 0.05;
                            nvy += sy * 0.05;
                            if (xs[i] < marg) nvx += edge;
                            else if (xs[i] > W - marg) nvx -= edge;
                            if (ys[i] < marg) nvy += edge;
                            else if (ys[i] > H - marg) nvy -= edge;
                            const s = Math.hypot(nvx, nvy);
                            if (s > max) {
                                nvx = (nvx / s) * max;
                                nvy = (nvy / s) * max;
                            } else if (s < min && s > 0) {
                                nvx = (nvx / s) * min;
                                nvy = (nvy / s) * min;
                            }
                            vx[i] = nvx;
                            vy[i] = nvy;
                        }
                        for (let i = 0; i < n; i++) {
                            let nx = xs[i] + vx[i],
                                ny = ys[i] + vy[i];
                            if (nx < 0) nx = 0;
                            else if (nx > W) nx = W;
                            if (ny < 0) ny = 0;
                            else if (ny > H) ny = H;
                            xs[i] = nx;
                            ys[i] = ny;
                        }
                        ctx.fillStyle =
                            "rgb(" + bg[0] + "," + bg[1] + "," + bg[2] + ")";
                        ctx.fillRect(0, 0, W, H);
                        const S = 5 * DPR;
                        const max2 = 2.6 * DPR,
                            min2 = max2 * 0.5,
                            span = max2 - min2;
                        for (let i = 0; i < n; i++) {
                            const sp = Math.hypot(vx[i], vy[i]) || 1;
                            const ux = vx[i] / sp,
                                uy = vy[i] / sp;
                            let t = (sp - min2) / span;
                            if (t < 0) t = 0;
                            else if (t > 1) t = 1;
                            let idx = ((0.45 + 0.55 * t) * 255) | 0;
                            if (idx > 255) idx = 255;
                            ctx.fillStyle = cstr[idx];
                            const nx = xs[i] + ux * S,
                                ny = ys[i] + uy * S;
                            const bx = xs[i] - ux * S * 0.7,
                                by = ys[i] - uy * S * 0.7;
                            ctx.beginPath();
                            ctx.moveTo(nx, ny);
                            ctx.lineTo(bx - uy * S * 0.5, by + ux * S * 0.5);
                            ctx.lineTo(bx + uy * S * 0.5, by - ux * S * 0.5);
                            ctx.closePath();
                            ctx.fill();
                        }
                    }
                    function frame() {
                        step();
                        raf = requestAnimationFrame(frame);
                    }
                    return {
                        start() {
                            if (!W) init();
                            if (REDUCED) {
                                for (let k = 0; k < 90; k++) step();
                                return;
                            }
                            if (!raf) frame();
                        },
                        stop() {
                            cancelAnimationFrame(raf);
                            raf = 0;
                        },
                        resize() {
                            init();
                        },
                    };
                }

                // ---- Particle life ----
                function createPL(canvas, stops, opts) {
                    const ctx = canvas.getContext("2d");
                    const lut = buildLUT(stops);
                    const K = (opts && opts.K) || 4;
                    const nMax = (opts && opts.nMax) || 340;
                    const nDiv = (opts && opts.nDiv) || 6500;
                    // Slice of the ramp the K species are sampled across.
                    const lo = (opts && opts.lo) || 0.4;
                    const hi = (opts && opts.hi) || 1.0;
                    const scol = [];
                    for (let k = 0; k < K; k++) {
                        const idx = ((lo + (hi - lo) * (k / (K - 1))) * 255) | 0;
                        scol[k] =
                            "rgb(" +
                            lut[idx * 3] +
                            "," +
                            lut[idx * 3 + 1] +
                            "," +
                            lut[idx * 3 + 2] +
                            ")";
                    }
                    const bg = hexToRgb(stops[0]);
                    let W = 0,
                        H = 0,
                        n = 0,
                        xs,
                        ys,
                        vx,
                        vy,
                        ty,
                        M,
                        raf = 0;
                    function init() {
                        const s = fitFull(canvas);
                        W = s.w;
                        H = s.h;
                        n = Math.min(nMax, Math.round((W * H) / nDiv));
                        xs = new Float32Array(n);
                        ys = new Float32Array(n);
                        vx = new Float32Array(n);
                        vy = new Float32Array(n);
                        ty = new Int8Array(n);
                        M = new Float32Array(K * K);
                        for (let i = 0; i < K * K; i++)
                            M[i] = Math.random() * 2 - 1;
                        for (let i = 0; i < n; i++) {
                            xs[i] = Math.random() * W;
                            ys[i] = Math.random() * H;
                            vx[i] = 0;
                            vy[i] = 0;
                            ty[i] = (Math.random() * K) | 0;
                        }
                    }
                    function step() {
                        const rMax = 62 * DPR,
                            rMaxSq = rMax * rMax,
                            beta = 0.3;
                        const force = 0.5,
                            velR = 0.88,
                            cap = rMax;
                        for (let i = 0; i < n; i++) {
                            let fx = 0,
                                fy = 0;
                            const ti = ty[i] * K,
                                x = xs[i],
                                y = ys[i];
                            for (let j = 0; j < n; j++) {
                                if (i === j) continue;
                                const dx = xs[j] - x,
                                    dy = ys[j] - y;
                                const d2 = dx * dx + dy * dy;
                                if (d2 > 0 && d2 < rMaxSq) {
                                    const r = Math.sqrt(d2),
                                        rn = r / rMax;
                                    let f;
                                    if (rn < beta) f = rn / beta - 1;
                                    else
                                        f =
                                            M[ti + ty[j]] *
                                            (1 -
                                                Math.abs(2 * rn - 1 - beta) /
                                                    (1 - beta));
                                    fx += (dx / r) * f;
                                    fy += (dy / r) * f;
                                }
                            }
                            let nvx = vx[i] * velR + fx * force;
                            let nvy = vy[i] * velR + fy * force;
                            const s = Math.hypot(nvx, nvy);
                            if (s > cap) {
                                nvx = (nvx / s) * cap;
                                nvy = (nvy / s) * cap;
                            }
                            vx[i] = nvx;
                            vy[i] = nvy;
                        }
                        for (let i = 0; i < n; i++) {
                            let nx = xs[i] + vx[i],
                                ny = ys[i] + vy[i];
                            if (nx < 0) {
                                nx = 0;
                                vx[i] *= -0.5;
                            } else if (nx > W) {
                                nx = W;
                                vx[i] *= -0.5;
                            }
                            if (ny < 0) {
                                ny = 0;
                                vy[i] *= -0.5;
                            } else if (ny > H) {
                                ny = H;
                                vy[i] *= -0.5;
                            }
                            xs[i] = nx;
                            ys[i] = ny;
                        }
                        ctx.fillStyle =
                            "rgb(" + bg[0] + "," + bg[1] + "," + bg[2] + ")";
                        ctx.fillRect(0, 0, W, H);
                        const D = 3 * DPR,
                            Dh = D / 2;
                        for (let i = 0; i < n; i++) {
                            ctx.fillStyle = scol[ty[i]];
                            ctx.fillRect(xs[i] - Dh, ys[i] - Dh, D, D);
                        }
                    }
                    function frame() {
                        step();
                        raf = requestAnimationFrame(frame);
                    }
                    return {
                        start() {
                            if (!W) init();
                            if (REDUCED) {
                                for (let k = 0; k < 120; k++) step();
                                return;
                            }
                            if (!raf) frame();
                        },
                        stop() {
                            cancelAnimationFrame(raf);
                            raf = 0;
                        },
                        resize() {
                            init();
                        },
                    };
                }

                // ---- Slime mold ----
                function createSlime(canvas, stops) {
                    const ctx = canvas.getContext("2d");
                    const lut = buildLUT(stops);
                    let gw = 0,
                        gh = 0,
                        field,
                        nf,
                        img,
                        data,
                        na = 0,
                        ax,
                        ay,
                        aa,
                        raf = 0;
                    function init() {
                        const g = fitGrid(canvas, 200);
                        gw = g.gw;
                        gh = g.gh;
                        field = new Float32Array(gw * gh);
                        nf = new Float32Array(gw * gh);
                        img = ctx.createImageData(gw, gh);
                        data = img.data;
                        na = Math.min(7000, Math.round(gw * gh * 0.28));
                        ax = new Float32Array(na);
                        ay = new Float32Array(na);
                        aa = new Float32Array(na);
                        const cx = gw / 2,
                            cy = gh / 2,
                            R = Math.min(gw, gh) * 0.42;
                        for (let i = 0; i < na; i++) {
                            const rr = Math.sqrt(Math.random()) * R,
                                th = Math.random() * TAU;
                            ax[i] = cx + Math.cos(th) * rr;
                            ay[i] = cy + Math.sin(th) * rr;
                            aa[i] = th + Math.PI / 2;
                        }
                    }
                    function sense(x, y, a, sd) {
                        let ix = (x + Math.cos(a) * sd) | 0;
                        let iy = (y + Math.sin(a) * sd) | 0;
                        ix -= Math.floor(ix / gw) * gw;
                        iy -= Math.floor(iy / gh) * gh;
                        return field[iy * gw + ix];
                    }
                    function step() {
                        const sa = 0.38,
                            ta = 0.6,
                            sd = 9,
                            sp = 1.0,
                            dep = 5;
                        for (let i = 0; i < na; i++) {
                            const x = ax[i],
                                y = ay[i],
                                a = aa[i];
                            const vc = sense(x, y, a, sd);
                            const vl = sense(x, y, a - sa, sd);
                            const vr = sense(x, y, a + sa, sd);
                            let na2 = a;
                            if (vc > vl && vc > vr) {
                            } else if (vc < vl && vc < vr)
                                na2 += (Math.random() < 0.5 ? -1 : 1) * ta;
                            else if (vr > vl) na2 += ta;
                            else if (vl > vr) na2 -= ta;
                            let nx = x + Math.cos(na2) * sp,
                                ny = y + Math.sin(na2) * sp;
                            nx -= Math.floor(nx / gw) * gw;
                            ny -= Math.floor(ny / gh) * gh;
                            ax[i] = nx;
                            ay[i] = ny;
                            aa[i] = na2;
                            field[(ny | 0) * gw + (nx | 0)] += dep;
                        }
                        const d = 0.18,
                            dn = d / 8,
                            dc = 1 - d,
                            decay = 1 - 0.05;
                        for (let y = 1; y < gh - 1; y++) {
                            const r = y * gw;
                            for (let x = 1; x < gw - 1; x++) {
                                const i = r + x;
                                const sum =
                                    field[i - gw - 1] +
                                    field[i - gw] +
                                    field[i - gw + 1] +
                                    field[i - 1] +
                                    field[i + 1] +
                                    field[i + gw - 1] +
                                    field[i + gw] +
                                    field[i + gw + 1];
                                nf[i] = (field[i] * dc + sum * dn) * decay;
                            }
                        }
                        const t = field;
                        field = nf;
                        nf = t;
                        for (let i = 0, p = 0; i < gw * gh; i++, p += 4) {
                            let v = field[i] * 4;
                            let idx = v >= 255 ? 255 : v < 0 ? 0 : v | 0;
                            const q = idx * 3;
                            data[p] = lut[q];
                            data[p + 1] = lut[q + 1];
                            data[p + 2] = lut[q + 2];
                            data[p + 3] = 255;
                        }
                        ctx.putImageData(img, 0, 0);
                    }
                    function frame() {
                        step();
                        raf = requestAnimationFrame(frame);
                    }
                    return {
                        start() {
                            if (!gw) init();
                            if (REDUCED) {
                                for (let k = 0; k < 120; k++) step();
                                return;
                            }
                            if (!raf) frame();
                        },
                        stop() {
                            cancelAnimationFrame(raf);
                            raf = 0;
                        },
                        resize() {
                            init();
                        },
                    };
                }

                // ---- Reaction–diffusion (Gray-Scott) ----
                function createRD(canvas, stops) {
                    const ctx = canvas.getContext("2d");
                    const lut = buildLUT(stops);
                    let gw = 0,
                        gh = 0,
                        A,
                        B,
                        A2,
                        B2,
                        img,
                        data,
                        raf = 0;
                    function splat(gx, gy, r) {
                        for (let dy = -r; dy <= r; dy++)
                            for (let dx = -r; dx <= r; dx++) {
                                if (dx * dx + dy * dy > r * r) continue;
                                let ix = gx + dx,
                                    iy = gy + dy;
                                if (ix < 0 || ix >= gw || iy < 0 || iy >= gh)
                                    continue;
                                const i = iy * gw + ix;
                                B[i] = 1;
                                A[i] = 0;
                            }
                    }
                    function init() {
                        const g = fitGrid(canvas, 156);
                        gw = g.gw;
                        gh = g.gh;
                        const c = gw * gh;
                        A = new Float32Array(c);
                        B = new Float32Array(c);
                        A2 = new Float32Array(c);
                        B2 = new Float32Array(c);
                        A.fill(1);
                        img = ctx.createImageData(gw, gh);
                        data = img.data;
                        const seeds = 34;
                        for (let k = 0; k < seeds; k++)
                            splat(
                                (Math.random() * gw) | 0,
                                (Math.random() * gh) | 0,
                                2,
                            );
                    }
                    function stepOne() {
                        const feed = 0.0545,
                            kill = 0.062,
                            dA = 1.0,
                            dB = 0.5;
                        for (let y = 1; y < gh - 1; y++) {
                            const r = y * gw;
                            for (let x = 1; x < gw - 1; x++) {
                                const i = r + x;
                                const a = A[i],
                                    b = B[i];
                                const lapA =
                                    (A[i - 1] +
                                        A[i + 1] +
                                        A[i - gw] +
                                        A[i + gw]) *
                                        0.2 +
                                    (A[i - gw - 1] +
                                        A[i - gw + 1] +
                                        A[i + gw - 1] +
                                        A[i + gw + 1]) *
                                        0.05 -
                                    a;
                                const lapB =
                                    (B[i - 1] +
                                        B[i + 1] +
                                        B[i - gw] +
                                        B[i + gw]) *
                                        0.2 +
                                    (B[i - gw - 1] +
                                        B[i - gw + 1] +
                                        B[i + gw - 1] +
                                        B[i + gw + 1]) *
                                        0.05 -
                                    b;
                                const abb = a * b * b;
                                let na = a + (dA * lapA - abb + feed * (1 - a));
                                let nb =
                                    b + (dB * lapB + abb - (kill + feed) * b);
                                A2[i] = na < 0 ? 0 : na > 1 ? 1 : na;
                                B2[i] = nb < 0 ? 0 : nb > 1 ? 1 : nb;
                            }
                        }
                        let t = A;
                        A = A2;
                        A2 = t;
                        t = B;
                        B = B2;
                        B2 = t;
                    }
                    function step() {
                        for (let s = 0; s < 6; s++) stepOne();
                        for (let i = 0, p = 0; i < gw * gh; i++, p += 4) {
                            let idx = (B[i] * 560) | 0;
                            if (idx > 255) idx = 255;
                            const q = idx * 3;
                            data[p] = lut[q];
                            data[p + 1] = lut[q + 1];
                            data[p + 2] = lut[q + 2];
                            data[p + 3] = 255;
                        }
                        ctx.putImageData(img, 0, 0);
                    }
                    function frame() {
                        step();
                        raf = requestAnimationFrame(frame);
                    }
                    return {
                        start() {
                            if (!gw) init();
                            if (REDUCED) {
                                for (let k = 0; k < 60; k++) step();
                                return;
                            }
                            if (!raf) frame();
                        },
                        stop() {
                            cancelAnimationFrame(raf);
                            raf = 0;
                        },
                        resize() {
                            init();
                        },
                    };
                }

                // ============================================================
                // SIM CATALOG
                // ============================================================
                const APPS = [
                    {
                        id: "slime",
                        name: "Slime Mold",
                        file: "slime-mold.html",
                        pitch: "Head for the most-worn ground, wear a path of your own. Watch the map grow, then reroll for a new one.",
                        pal: "Inferno",
                        make: createSlime,
                    },
                    {
                        id: "boids",
                        name: "Boids",
                        file: "boids.html",
                        pitch: "Stick together, match speed, don't crowd. Nudge the flock and see what happens.",
                        pal: "Cyber",
                        make: createBoids,
                    },
                    {
                        id: "particle-life",
                        name: "Particle Life",
                        file: "particle-life.html",
                        pitch: "Some colors pull together, others shove apart. Roll new rules and see what assembles.",
                        pal: "Twilight",
                        make: createPL,
                    },
                    {
                        id: "flow",
                        name: "Flow Field",
                        file: "flow-field.html",
                        pitch: "Thousands of particles ride an invisible current across the screen. Drag through it and watch the streams bend.",
                        pal: "Iris",
                        make: createFlow,
                    },
                    {
                        id: "rd",
                        name: "Reaction-Diffusion",
                        file: "reaction-diffusion.html",
                        pitch: "One chemical feeds, the other kills, and they spread until patterns form. Paint some in and watch it grow.",
                        pal: "Acid",
                        make: createRD,
                    },
                ];

                const explainOf = (file) =>
                    file.replace(".html", "-explained.html");

                // ============================================================
                // WORLDS GALLERY
                // ============================================================
                const galleryEl = document.getElementById("gallery");
                const previews = [];

                APPS.forEach((app) => {
                    const card = document.createElement("article");
                    card.className = "world";
                    card.id = app.id;
                    // Retint this card's accent to its world (option 10-B); the
                    // world id is the sim's filename (e.g. "slime-mold").
                    card.dataset.world = app.file.replace(".html", "");
                    card.innerHTML = `
                        <canvas class="bg"></canvas>
                        <div class="scrim"></div>
                        <div class="content">
                            <h2 class="wname">${app.name}</h2>
                            <p class="pitch">${app.pitch}</p>
                            <div class="cta-row">
                                <a class="cta" href="${app.file}">Poke It</a>
                                <a class="cta-ghost" href="${explainOf(app.file)}">Understand It</a>
                            </div>
                        </div>`;
                    galleryEl.appendChild(card);
                    const canvas = card.querySelector("canvas");
                    card.__prev = app.make(canvas, PALS[app.pal]);
                    previews.push(card.__prev);
                });

                // ============================================================
                // ABOUT CARD — closes the gallery with a short project blurb
                // ============================================================
                const about = document.createElement("article");
                about.className = "world world-about";
                about.innerHTML = `
                    <canvas class="bg"></canvas>
                    <div class="scrim"></div>
                    <div class="content">
                        <h2 class="wname">A handful of rules each</h2>
                        <p class="pitch">
                            Each one runs nothing but a few simple rules, yet
                            flocks, trails, and lifelike patterns appear on their
                            own. Watch them run, poke at one, or see how it
                            works.
                        </p>
                        <div class="cta-row">
                            <a class="cta" href="feed.html">Explore <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg></a>
                        </div>
                    </div>`;
                galleryEl.appendChild(about);
                // Black-and-white particle-life demo behind the about blurb.
                about.__prev = createPL(
                    about.querySelector("canvas"),
                    PALS.Mono,
                    { K: 6, nMax: 700, nDiv: 4000, lo: 0.28, hi: 1.0 },
                );
                previews.push(about.__prev);

                // ============================================================
                // HERO — self-cycling feed, crossfaded across two canvases
                // ============================================================
                const heroEl = document.querySelector(".hero");
                const heroCanvas = [
                    document.getElementById("hero-a"),
                    document.getElementById("hero-b"),
                ];
                const heroEngine = [null, null];
                let heroVisible = 0; // canvas slot currently shown
                let heroIdx = Math.floor(Math.random() * APPS.length); // which APP
                let heroTimer = null;
                let heroActive = false;

                function buildHero(slot, appIdx) {
                    if (heroEngine[slot]) heroEngine[slot].stop();
                    const app = APPS[appIdx];
                    heroEngine[slot] = app.make(
                        heroCanvas[slot],
                        PALS[app.pal],
                    );
                    return heroEngine[slot];
                }
                function cycleHero() {
                    const slot = heroVisible ^ 1;
                    const old = heroVisible;
                    heroIdx = (heroIdx + 1) % APPS.length;
                    buildHero(slot, heroIdx).start();
                    heroCanvas[slot].classList.add("show");
                    heroCanvas[old].classList.remove("show");
                    heroVisible = slot;
                    // Drop the outgoing engine once the crossfade has finished.
                    setTimeout(
                        () => heroEngine[old] && heroEngine[old].stop(),
                        1200,
                    );
                }
                function startHero() {
                    if (heroActive) return;
                    heroActive = true;
                    if (!heroEngine[heroVisible])
                        buildHero(heroVisible, heroIdx);
                    heroCanvas[heroVisible].classList.add("show");
                    heroEngine[heroVisible].start();
                    if (!REDUCED) heroTimer = setInterval(cycleHero, 6000);
                }
                function stopHero() {
                    heroActive = false;
                    if (heroTimer) {
                        clearInterval(heroTimer);
                        heroTimer = null;
                    }
                    heroEngine.forEach((e) => e && e.stop());
                }

                // ============================================================
                // LAZY START / STOP ON SCROLL
                // ============================================================
                const io = new IntersectionObserver(
                    (entries) => {
                        entries.forEach((e) => {
                            if (e.target === heroEl) {
                                if (
                                    e.isIntersecting &&
                                    e.intersectionRatio > 0.2
                                )
                                    startHero();
                                else stopHero();
                                return;
                            }
                            const prev = e.target.__prev;
                            const content = e.target.querySelector(".content");
                            if (
                                e.isIntersecting &&
                                e.intersectionRatio > 0.35
                            ) {
                                if (prev) prev.start();
                                if (content) content.classList.add("in");
                            } else if (prev) {
                                prev.stop();
                            }
                        });
                    },
                    { threshold: [0, 0.2, 0.35, 0.7] },
                );
                io.observe(heroEl);
                document
                    .querySelectorAll(".world")
                    .forEach((s) => io.observe(s));

                // Hero is on screen at load — kick it off immediately.
                startHero();

                // ---------- Resize ----------
                let rt = null;
                window.addEventListener("resize", () => {
                    if (rt) clearTimeout(rt);
                    rt = setTimeout(() => {
                        heroEngine.forEach((e) => e && e.resize());
                        previews.forEach((p) => p.resize());
                    }, 250);
                });
            })();
        </script>
    </body>
</html>
